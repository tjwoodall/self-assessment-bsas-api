openapi: 3.0.3
info:
  version: '7.0'
  title: Business Source Adjustable Summary (MTD)
  description: |
    Retrieve an adjustable summary calculation for a specified self-employment or property business, for a given
    accounting period.

    **Some of the endpoints in this API return accounting period start and end dates. These should not be displayed to users of your software and will be removed in a future update.**

    The following groups of endpoints are stateful in the Sandbox:
    * [Self-employment business](#tag/Self-employment-business)
    * [UK property business](#tag/UK-property-business)
    * [Foreign property business](#tag/Foreign-property-business)

    The following endpoints are stateful in the Sandbox:
    * Trigger a Business Source Adjustable Summary
    * List a Business Source Adjustable Summary

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) 
    during initial development and as part of your quality assurance checks.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) GitHub wiki.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Self-employment business
    description: Resources relating to Self-employment business
  - name: UK property business
    description: Resources relating to UK property business
  - name: Foreign property business
    description: Resources relating to Foreign property business
paths:
  /individuals/self-assessment/adjustable-summary/{nino}/{taxYear}:
    get:
      summary: List Business Source Adjustable Summaries
      description: "This endpoint allows the user to generate a list of Business Source Adjustable Summaries for a given tax year. A \nfilter can be set to return the summaries for a single business or business type. The National Insurance number must\nbe provided.\n\n### Test data\nScenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.  \n\n| Tax Years        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                      |\n|------------------|----------------------------------|-------------------------------------------------------------------------------------------------------------------------------|\n| ALL              | N/A - DEFAULT                    | Simulate a successful response containing multiple business types.                                                            |\n| ALL              | SELF_EMPLOYMENT                  | Simulate a successful response containing a self-employment business.                                                         |\n| ALL              | UK_PROPERTY                      | Simulate a successful response containing a UK property business.                                                             |\n| Before 2025-26   | UK_PROPERTY_FHL                  | Simulate a successful response containing UK FHL property businesses.                                                         |\n| ALL              | FOREIGN_PROPERTY                 | Simulate a successful response containing a foreign property business.                                                        |\n| Before 2025-26   | FOREIGN_PROPERTY_FHL             | Simulate a successful response containing EEA FHL foreign property businesses. \t                                              |\n| ALL              | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                                |\n| ALL              | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |\n| ALL              | DYNAMIC                          | The following response values will change to correspond to the values submitted in the request:<br> • businessID<br> • typeOfBusiness<br> • accountingPeriod.startdate<br> • accountingPeriod.enddate<br> • taxYear<br> • requestedDatetime<br> • adjustedDatetime<br><br> Use one of the following businessIDs for the appropriate scenario:<br> • XBIS12345678901 for a response with a self-employment business<br> • XBIS12345678902 for a response with a uk-property business<br> • XBIS12345678915 for a response with a foreign-property business<br> • XBIS12345678903 for a response with a foreign-property-fhl-eea business (2024-25 or before only)<br> • XBIS12345678904 for a response with a uk-property-fhl business (2024-25 or before only)<br>|\n| ALL              | STATEFUL                         | Performs a stateful list.                                                                                                     |   \n"
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_6
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies in the format YYYY-YY. The range must not be greater than a single year.
            For example, 2023-25 is not valid.
          schema: &ref_18
            type: string
            example: 2023-24
            pattern: ^\d{4}-\d{2}$
          required: true
        - name: typeOfBusiness
          in: query
          description: |
            The type of business the summary calculation is for.

            Limited to the following possible values for tax years 2024-25 and before:

            - foreign-property-fhl-eea
            - foreign-property
            - uk-property
            - uk-property-fhl
            - self-employment

            Limited to the following possible values for tax year 2025-26 onwards:

            - foreign-property
            - uk-property
            - self-employment
          schema:
            type: string
            enum:
              - self-employment
              - uk-property-fhl
              - uk-property
              - foreign-property-fhl-eea
              - foreign-property
            example: foreign-property
          required: false
        - name: businessId
          in: query
          description: An identifier for the business, unique to the customer.
          schema:
            type: string
            example: XBIS12345678901
            pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_7
            type: string
            enum:
              - application/vnd.hmrc.7.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_19
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_8
            type: string
            example: '-'
          required: false
      security:
        - User-Restricted:
            - read:self-assessment
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: &ref_1
                type: string
                example: Sun, 01 Jan 2023 23:59:59 GMT
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: &ref_2
                type: string
                example: Sun, 02 Jul 2023 23:59:59 GMT
              required: false
            Link:
              name: Link
              in: header
              description: |
                URL of the documentation for the API.
              schema: &ref_3
                type: string
                example: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/self-assessment-bsas-api
              required: false
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: For TY 2024-25 and before
                    description: List Business Source Adjustable Summaries Response
                    type: object
                    properties:
                      businessSources:
                        title: Business Source
                        description: The array holding Business Source Accounting Summary Entries, by business Income Source.
                        type: array
                        items:
                          type: object
                          required:
                            - typeOfBusiness
                            - businessId
                            - accountingPeriod
                            - taxYear
                            - summaries
                          properties:
                            typeOfBusiness:
                              title: typeOfBusiness
                              description: The type of business the summary calculation is for.
                              type: string
                              enum: &ref_9
                                - self-employment
                                - uk-property-fhl
                                - uk-property
                                - foreign-property-fhl-eea
                                - foreign-property
                            businessId:
                              title: businessId
                              description: An identifier for the business, unique to the customer.
                              type: string
                              pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                              example: XAIS12345678910
                            accountingPeriod:
                              type: object
                              title: The accounting period
                              description: |-
                                The duration of the business income source operations to be included in the tax year submission. 2019-20 is the earliest tax year to which the accounting period can be assigned.

                                Note: <b>Accounting period start and end dates should not be displayed to users of your software.</b>
                              required:
                                - startDate
                                - endDate
                              properties:
                                startDate:
                                  type: string
                                  description: The date the accounting period began.
                                  example: '2018-05-01'
                                endDate:
                                  type: string
                                  description: The date the accounting period finished. The accounting period must end in the tax year to which it is assigned. For MTD submissions 2019-20 is the earliest tax year in which an accounting period can end.
                                  example: '2019-04-30'
                              additionalProperties: false
                            taxYear:
                              type: string
                              description: The tax year that the Adjustable Summary Calculation relates to.
                              example: 2020-21
                            summaries:
                              title: Summaries
                              description: The array holding Business Source Accounting Summary Entries.
                              type: array
                              items:
                                type: object
                                properties:
                                  calculationId:
                                    title: Calculation ID
                                    description: The unique identifier of the summary calculation.
                                    type: string
                                    example: 717f3a7a-db8e-11e9-8a34-2a2ae2dbcce4
                                    pattern: ^[0-9]{8}|[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
                                  requestedDateTime:
                                    title: Requested Datetime
                                    description: The date and time this summary calculation was originally requested, prior to any adjustments.
                                    type: string
                                  summaryStatus:
                                    title: Summary Status
                                    description: The status of this calculated summary.
                                    type: string
                                    enum:
                                      - valid
                                      - invalid
                                      - superseded
                                  adjustedSummary:
                                    title: Adjusted Summary
                                    description: Indicates whether the original summary calculation has had adjustments applied.
                                    type: boolean
                                    example: 'false'
                                  adjustedDateTime:
                                    title: Adjusted Datetime
                                    description: The date and time this calculation was adjusted.
                                    type: string
                                required:
                                  - calculationId
                                  - requestedDateTime
                                  - summaryStatus
                                  - adjustedSummary
                                additionalProperties: false
                          additionalProperties: false
                    required:
                      - businessSources
                    additionalProperties: false
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: For TY 2025-26 and after
                    description: List Business Source Adjustable Summaries Response
                    type: object
                    properties:
                      businessSources:
                        title: Business Source
                        description: The array holding Business Source Accounting Summary Entries, by business Income Source.
                        type: array
                        items:
                          type: object
                          required:
                            - typeOfBusiness
                            - businessId
                            - accountingPeriod
                            - taxYear
                            - summaries
                          properties:
                            typeOfBusiness:
                              title: typeOfBusiness
                              description: The type of business the summary calculation is for.
                              type: string
                              enum: &ref_10
                                - self-employment
                                - uk-property
                                - foreign-property
                            businessId:
                              title: businessId
                              description: An identifier for the business, unique to the customer.
                              type: string
                              pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                              example: XAIS12345678910
                            accountingPeriod:
                              type: object
                              title: The accounting period
                              description: |-
                                The duration of the business income source operations to be included in the tax year submission. 2019-20 is the earliest tax year to which the accounting period can be assigned.

                                Note: <b>Accounting period start and end dates should not be displayed to users of your software.</b>
                              required:
                                - startDate
                                - endDate
                              properties:
                                startDate:
                                  type: string
                                  description: The date the accounting period began.
                                  example: '2018-05-01'
                                endDate:
