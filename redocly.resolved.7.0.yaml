                  - $schema: http://json-schema.org/draft-04/schema#
                    title: '[Test only] TY 2026-27 onwards'
                    description: Retrieve a Foreign property Business Source Adjustable Summary Response.
                    type: object
                    properties:
                      metadata:
                        type: object
                        description: Object containing the identifying data for the business and associated information for the BSAS with this ID.
                        properties:
                          calculationId:
                            description: The unique identifier of the summary calculation.
                            type: string
                            example: 717f3a7a-db8e-11e9-8a34-2a2ae2dbcce4
                          requestedDateTime:
                            description: The date and time the summary calculation was originally requested, prior to any adjustments.
                            type: string
                            example: '2019-04-04T01:01:01Z'
                          adjustedDateTime:
                            description: The date and time this calculation was adjusted.
                            type: string
                            example: '2019-04-04T01:01:01Z'
                          nino:
                            description: National Insurance number, in the format AA999999A.
                            type: string
                            example: TC663795B
                          taxYear:
                            description: The tax year the data applies to, for example, 2021-22. The start year and end year must not span two tax years. No gaps are allowed, for example, 2020-22 is not valid.
                            type: string
                            example: 2021-22
                          summaryStatus:
                            type: string
                            enum:
                              - valid
                              - invalid
                              - superseded
                            description: The status of the this calculated summary.
                        required:
                          - calculationId
                          - requestedDateTime
                          - nino
                          - taxYear
                          - summaryStatus
                        additionalProperties: false
                      inputs:
                        type: object
                        description: Object containing the inputs that were used in this calculation.
                        properties:
                          businessId:
                            description: An identifier for the business, unique to the customer.
                            type: string
                            pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                            example: XAIS12345678910
                          businessName:
                            description: The name of the business.
                            type: string
                            example: 'My foreign property business '
                          accountingPeriodStartDate:
                            description: |-
                              The date the accounting period started.

                              Note: <b>Accounting period start and end dates should not be displayed to users of your software.</b>
                            type: string
                            example: '2021-04-06'
                          accountingPeriodEndDate:
                            description: |-
                              The date the accounting period ended.

                              Note: <b>Accounting period start and end dates should not be displayed to users of your software.</b>
                            type: string
                            example: '2022-04-05'
                          source:
                            type: string
                            enum:
                              - MTD-SA
                            description: Specifies the source of the income data used in this calculation.
                          submissionPeriod:
                            type: object
                            description: Object containing the submission period for the income source.
                            properties:
                              submissionId:
                                description: A reference to the unique identifier of the period.
                                type: string
                                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$
                                example: 4557ecb5-fd32-48cc-81f5-e6acd1099f3c
                              startDate:
                                description: The date the submission period started.
                                type: string
                                example: '2019-04-06'
                              endDate:
                                description: The date the submission period ended.
                                type: string
                                example: '2019-07-05'
                              receivedDateTime:
                                description: The date and time data received.
                                type: string
                                example: '2021-07-09T01:01:01.000Z'
                            required:
                              - submissionId
                              - startDate
                              - endDate
                              - receivedDateTime
                            additionalProperties: false
                        required:
                          - businessId
                          - accountingPeriodStartDate
                          - accountingPeriodEndDate
                          - source
                          - submissionPeriod
                        additionalProperties: false
                      adjustableSummaryCalculation:
                        type: object
                        description: Object containing the details about foreign property summary calculation.
                        properties:
                          totalIncome:
                            description: The total income for the income source. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                            type: number
                            minimum: 0
