  /individuals/self-assessment/adjustable-summary/{nino}/trigger:
    post:
      summary: Trigger a Business Source Adjustable Summary
      description: |
        This endpoint allows a developer to generate an end of accounting period Business Source Adjustable Summary of the 
        income and expenditure for a specified business for a given accounting period. A Business Source Adjustable Summary 
        must be generated before accounting adjustments are to be entered. A National Insurance number must be provided.

        <strong>
          Note: For tax years before 2025-26, data can be submitted for UK FHL or Non-FHL, Foreign EEA-FHL or Non-FHL property business types. From tax year 2025-26 onwards, the UK FHL, UK Non-FHL, Foreign EEA-FHL and Non-FHL property types are no longer valid and you must use the UK Property or Foreign Property type.
        </strong>  

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.  

        |Tax year        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                     |
        |----------------|----------------------------------|------------------------------------------------------------------------------------------------------------------------------|
        |ALL             | N/A - DEFAULT                    | Simulates success response.                                                                                                  |
        |ALL             | NO_ACCOUNTING_PERIOD             | Simulates the scenario where the supplied accounting period does not exist.                                                  |
        |ALL             | OBLIGATIONS_NOT_MET              | Simulates the scenario where obligations for the business have not been met.                                                 |
        |ALL             | ACCOUNTING_PERIOD_NOT_ENDED      | Simulates the scenario where the supplied accounting period has not ended.                                                   |
        |2025-26 onwards | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                              |
        |ALL             | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                               |
        |ALL             | TAX_YEAR_NOT_SUPPORTED           | Simulates the scenario where the tax year is not supported.                                                                  |
        |ALL             | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
        |ALL             | STATEFUL                         | Performs a stateful trigger.                                                                                                 |
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_6
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_7
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_24
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_25
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      security:
        - User-Restricted:
            - write:self-assessment
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $schema: http://json-schema.org/draft-04/schema#
                  title: For TY 2024-25 and before
                  description: Trigger a Business Source Adjustable Summary (BSAS)
                  type: object
                  properties:
                    accountingPeriod:
                      type: object
                      title: The accounting period
                      description: |-
                        The duration of the business income source operations to be included in the tax year submission. The earliest tax year to which the accounting period can be assigned is 2019-20 for self-employment and UK property, and for foreign property, it is 2021-22.

                        Note: <b>Accounting period start and end dates should not be displayed to users of your software.</b>
                      properties:
                        startDate:
                          type: string
                          description: The date the accounting period started. This date must fall on the 6th of April.
                          example: '2019-04-06'
                        endDate:
                          type: string
                          description: "\t\nThe date the accounting period ended. The accounting period must end in the tax year to which it is assigned (i.e. the 5th of April). For Making Tax Digital (MTD) submissions, the earliest tax year in which an accounting period can end is 2019-20 for self-employment and UK property, and for foreign property, it is 2021-22."
                          example: '2020-04-05'
                      required:
                        - startDate
                        - endDate
                      additionalProperties: false
                    typeOfBusiness:
                      title: typeOfBusiness
                      description: The type of business the summary calculation is for.
                      type: string
                      enum: *ref_9
                    businessId:
                      title: businessId
                      description: An identifier for the business, unique to the customer.
                      type: string
                      pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
                      example: XAIS12345678910
                  required:
                    - accountingPeriod
                    - typeOfBusiness
                    - businessId
                  additionalProperties: false
                - $schema: http://json-schema.org/draft-04/schema#
                  title: For TY 2025-26 and after
                  description: Trigger a Business Source Adjustable Summary (BSAS)
                  type: object
                  properties:
                    accountingPeriod:
                      type: object
