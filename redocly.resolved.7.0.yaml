  /individuals/self-assessment/adjustable-summary/{nino}/uk-property/{calculationId}/adjust/{taxYear}:
    post:
      summary: Submit UK Property Accounting Adjustments
      description: |
        This endpoint allows the user to provide accounting adjustments against a specified Business Source Accounting
        Summary quoting its unique identifier. The calculation ID quoted must be for a UK Property Business, and it must not
        have been adjusted previously. Only data for one property business (either FHL or Non-FHL) should be included in any
        submission. A National Insurance number and calculation ID must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)                 | Scenario                                                                                                                     |
        |--------------------------------------------------|------------------------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                                    | Simulates success response.                                                                                                  |
        | TYPE_OF_BUSINESS_INCORRECT                       | Simulates the scenario where the calculation ID supplied does not relate to a UK property business.                          |
        | SUMMARY_STATUS_INVALID                           | Simulates the scenario where the summary is invalid and cannot be adjusted.                                                  |
        | SUMMARY_STATUS_SUPERSEDED                        | Simulates the scenario where the summary is superseded and cannot be adjusted.                                               |
        | ALREADY_ADJUSTED                                 | Simulates the scenario where the summary has already been adjusted.                                                          |
        | RESULTING_VALUE_NOT_PERMITTED                    | Simulates the scenario where one or more adjustments would result in a negative value that is not permitted.                 |
        | UK_PROPERTY_OVER_CONSOLIDATED_EXPENSES_THRESHOLD | Simulates the scenario where the cumulative turnover amount exceeds the consolidated expenses threshold.                     |
        | UK_PROPERTY_INCOME_ALLOWANCE_CLAIMED             | Simulates the scenario where property income allowance was claimed but the adjustment was made to expenses.                  |
        | OUTSIDE_AMENDMENT_WINDOW                         | Simulates the scenario where request cannot be completed as it is outside the amendment window.                              |
        | NOT_FOUND                                        | Simulates the scenario where no data is found.                                                                               |
        | TAX_YEAR_NOT_SUPPORTED                           | Simulates the scenario where the tax year is not supported.                                                                  |
        | REQUEST_CANNOT_BE_FULFILLED                      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.|
        | STATEFUL                                         | Performs a stateful submit.                                                                                                  |
      tags:
        - UK property business
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_6
          required: true
        - name: calculationId
          in: path
          description: The unique identifier of the summary calculation.
          schema: *ref_23
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies in the format YYYY-YY. The range must not be greater than a single year.
            For example, 2023-25 is not valid.
          schema: *ref_18
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_7
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_24
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_25
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_8
          required: false
      security:
        - User-Restricted:
            - write:self-assessment
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $schema: http://json-schema.org/draft-04/schema#
                  title: For TY 2023-24 and before
                  description: This endpoint allows the user to provide accounting adjustments against a specified Business Source Accounting Summary quoting its unique identifier. The calculation ID quoted must be for a UK Property Business, and it must not have been adjusted previously. Only data for one property business (either FHL or Non-FHL) should be included in any submission. A National Insurance number and calculation ID must be provided.
                  type: object
                  properties:
                    ukProperty:
                      type: object
                      description: Object holding UK Property adjustments.
                      properties:
                        income:
                          type: object
                          description: Object containing the adjustments to income values.
                          properties:
                            totalRentsReceived:
                              description: The adjustment to total property rental income. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            premiumsOfLeaseGrant:
                              description: The adjustment to premiums received for the grant of a lease and other lump sums to possess a property. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            reversePremiums:
                              description: The adjustment to reverse premiums and inducements. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            otherPropertyIncome:
                              description: The adjustment to other income from property, such as rent charges and ground rents, income from letting others tip waste on your land, and income for the use of a caravan or houseboat at a fixed location. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                          additionalProperties: false
                        expenses:
                          type: object
                          description: Object containing the adjustments to expenses values.
                          properties:
                            consolidatedExpenses:
                              description: The adjustment to the sum of all expenses for the specified period. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            premisesRunningCosts:
                              description: The adjustment to rent, rates, insurance, ground rents etc. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            repairsAndMaintenance:
                              description: The adjustment to property repairs and maintenance. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            financialCosts:
                              description: The adjustment to loan interest and other financial costs. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            professionalFees:
                              description: The adjustment to legal, management and other professional fees. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
                              example: '1000.45'
                            costOfServices:
                              description: The adjustment to cost of services provided, including wages. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places (excluding 0 or 0.00).
                              type: number
                              multipleOf: 0.01
                              minimum: -99999999999.99
                              maximum: 99999999999.99
